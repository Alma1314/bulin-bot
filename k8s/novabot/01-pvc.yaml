apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nova-bot-data-pvc
  namespace: nova-bot-standalone-ns
  labels:
    app: nova-bot-standalone
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard # uncomment and set proper StorageClass