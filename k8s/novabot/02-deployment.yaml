apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-bot-standalone
  namespace: nova-bot-standalone-ns
  labels:
    app: nova-bot-standalone
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nova-bot-standalone
  template:
    metadata:
      labels:
        app: nova-bot-standalone
    spec:
      containers:
        - name: nova-bot
          image: soulter/nova-bot:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Asia/Shanghai"
          ports:
            - containerPort: 6185
              name: webui
            - containerPort: 6199
              name: qq-ws
            # - containerPort: 6195
            #   name: wecom-wh
            # - containerPort: 6196
            #   name: qq-off-wh
          volumeMounts:
            - name: data
              mountPath: /NovaBot/data
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nova-bot-data-pvc
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File