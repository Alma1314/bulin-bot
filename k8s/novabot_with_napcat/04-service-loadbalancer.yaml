apiVersion: v1
kind: Service
metadata:
  name: nova-bot-service-lb
  namespace: nova-bot-ns
  labels:
    app: nova-bot-stack
spec:
  type: LoadBalancer
  selector:
    app: nova-bot-stack
  ports:
    - name: napcat-web
      port: 6099
      targetPort: 6099
    - name: nova-bot-web
      port: 6185
      targetPort: 6185