apiVersion: v1
kind: Service
metadata:
  name: nova-bot-service-nodeport
  namespace: nova-bot-ns
  labels:
    app: nova-bot-stack
spec:
  type: NodePort
  selector:
    app: nova-bot-stack
  ports:
    - name: napcat-web
      port: 6099
      targetPort: 6099
      # nodePort: 30099 # Optional: Specify a fixed NodePort if needed, otherwise remove this line
    - name: nova-bot-web
      port: 6185
      targetPort: 6185
      # nodePort: 30185 # Optional: Specify a fixed NodePort if needed, otherwise remove this line